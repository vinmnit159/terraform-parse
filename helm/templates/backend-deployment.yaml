apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    {{- include "tripla-apps.labels" (dict "root" . "component" "backend") | nindent 4 }}
spec:
  {{- if not .Values.backend.autoscaling.enabled }}
  replicas: {{ .Values.backend.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "tripla-apps.selectorLabels" (dict "root" . "component" "backend") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tripla-apps.labels" (dict "root" . "component" "backend") | nindent 8 }}
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          args:
            - "-text=hello"
            # http-echo listens on 5678 by default; align with the Service.
            - "-listen=:{{ .Values.backend.service.port }}"
          ports:
            - name: http
              containerPort: {{ .Values.backend.service.port }}
          readinessProbe:
            httpGet:
              path: /
              port: http
          livenessProbe:
            httpGet:
              path: /
              port: http
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}