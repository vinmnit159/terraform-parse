apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
  labels:
    {{- include "tripla-apps.labels" (dict "root" . "component" "frontend") | nindent 4 }}
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: http
  selector:
    {{- include "tripla-apps.selectorLabels" (dict "root" . "component" "frontend") | nindent 4 }}