frontend:
  replicaCount: 2
  image:
    repository: nginx
    tag: "1.27"
  service:
    # LoadBalancer never provisions on kind/minikube; default to ClusterIP
    # and override per environment where a cloud LB exists.
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

backend:
  replicaCount: 1
  image:
    repository: hashicorp/http-echo
    tag: "1.0.0"
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 64Mi
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 50

terraformParse:
  replicaCount: 2
  image:
    # Built locally and loaded into the cluster (kind load docker-image);
    # push to a registry and change this for real environments.
    repository: terraform-parse
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  containerPort: 5000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi